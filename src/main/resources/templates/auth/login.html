<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container narrow">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="card form">
        <h1>Login</h1>
        <p class="field-error" th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}"></p>

        <label>Username
            <input type="text" th:field="*{username}">
        </label>
        <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>

        <label>Password
            <input type="password" th:field="*{password}">
        </label>
        <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

        <button class="btn btn-primary" type="submit">Login</button>
        <p class="muted">No account yet? <a th:href="@{/register}">Register</a></p>
    </form>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
